{% extends "base.html" %}
{% block title %}Provisioner - LITTERBOX Manager{% endblock %}

{% block content %}

<style>
    /* Full-width line container */
    .diff-line {
        display: block;
        width: 100%;
        padding: 0 10px;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        white-space: pre; /* Keeps the git indentation */
    }

    /* Green lines for additions */
    .diff-added {
        background-color: #e6ffec !important;
        color: #1a7f37 !important;
    }

    /* Red lines for removals */
    .diff-removed {
        background-color: #ffeef0 !important;
        color: #d73a49 !important;
    }

    /* Purple lines for hunk headers (@@) */
    .diff-header {
        background-color: #f6f8fa !important;
        color: #6f42c1 !important;
        font-weight: bold;
    }

    /* Selection highlight color */
    #diff-results ::selection {
        background-color: #b3d4fc;
    }
</style>

<div class="container mt-4">

    <h2 id="title" class="mb-4">Manage GIT Repository</h2>
    <form id="git-form" class="border border-2">
        <div id="git-changes" class="mb-4">
        </div>

        <div class="container-fluid py-3 border-top mt-auto">
            <div class="row align-items-center">

                <div class="col-8 d-flex align-items-center gap-2 border-end">
                    <button id="commit" type="button" class="btn btn-primary">Commit</button>

                    <div class="btn-group">
                        <button type="button" class="btn btn-success" id="branch-push-action">Push</button>
                        <button type="button" class="btn btn-success dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown" aria-expanded="false"></button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item fw-bold" id="push-standard" href="#">Standard</a></li>
                            <li><a class="dropdown-item text-danger fw-bold" id="push-force" href="#">Force</a></li>
                        </ul>
                    </div>

                    <button id="fetch" type="button" class="btn btn-light border">Fetch</button>
                    <button id="squash" type="button" class="btn btn-warning">Squash</button>

                    <div class="btn-group">
                        <button type="button" class="btn btn-danger" id="reset">Reset</button>
                        <button type="button" class="btn btn-danger dropdown-toggle dropdown-toggle-split" data-bs-toggle="dropdown" aria-expanded="false"></button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item text-secondary fw-bold" id="reset-soft" href="#">Soft</a></li>
                            <li><a class="dropdown-item text-warning fw-bold" id="reset-files" href="#">Files</a></li>
                            <li><a class="dropdown-item text-danger fw-bold" id="reset-hard" href="#">Hard</a></li>
                        </ul>
                    </div>

                    <div class="dropdown">
                        <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">Branch</button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" id="branch-checkout" href="#">Checkout</a></li>
                            <li><a class="dropdown-item" id="branch-create" href="#">Create</a></li>
                        </ul>
                    </div>

                </div>

                <div class="col-4 d-flex justify-content-around align-items-center text-muted small px-3">
                    <div class="form-check mb-0">
                        <input class="form-check-input" type="checkbox" id="check-unstaged">
                        <label class="form-check-label" for="check-unstaged">Unstaged</label>
                    </div>
                    <div class="form-check mb-0">
                        <input class="form-check-input" type="checkbox" id="check-staged">
                        <label class="form-check-label" for="check-staged">Staged</label>
                    </div>
                    <div class="form-check mb-0">
                        <input class="form-check-input" type="checkbox" id="check-committed">
                        <label class="form-check-label" for="check-committed">Committed</label>
                    </div>
                    <div class="form-check mb-0">
                        <input class="form-check-input" type="checkbox" id="check-log" checked>
                        <label class="form-check-label" for="check-log">Logs</label>
                    </div>
                </div>

            </div>
        </div>

    </form>

    <div id="git-log-section"></div>
    <div id="unstaged-changes"></div>
    <div id="staged-changes"></div>
    <div id="committed-changes"></div>
</div>

<div class="modal fade" id="selection-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white border-secondary">

            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="generic-modal-title">Action Required</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <div id="modal-text-group" class="d-none">
                    <p id="modal-text-content"></p>
                </div>

                <div id="modal-info-group" class="d-none mt-3 p-2 bg-black rounded border border-secondary">
                    <div id="modal-info-content" class="small font-monospace text-info" style="word-break: break-all;">
                    </div>
                </div>

                <div id="branch-select-group" class="d-none">
                    <label class="form-label text-info">Select Existing Branch</label>
                    <select id="branch-dropdown" class="form-select bg-secondary text-white border-0"></select>
                </div>

                <div id="message-input-group" class="d-none">
                    <label id="message-label" class="form-label text-success">Fill this in JS</label>
                    <input type="text" id="message-input" class="form-control bg-secondary text-white border-0" placeholder="e.g., fill-sample-in-js">
                </div>
            </div>

            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="confirm-button" class="btn btn-primary">Confirm</button>
            </div>
        </div>
    </div>
</div>

<script>
    let data = {{ status_data|tojson }};
</script>
<script src="{{ url_for('static', filename='git_manager/tools.js') }}"></script>
<script src="{{ url_for('static', filename='global.js') }}"></script>
{% endblock %}
