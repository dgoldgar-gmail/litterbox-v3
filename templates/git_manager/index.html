{% extends "base.html" %}
{% block title %}Provisioner - LITTERBOX Manager{% endblock %}

{% block content %}

<style>
    /* Full-width line container */
    .diff-line {
        display: block;
        width: 100%;
        padding: 0 10px;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        white-space: pre; /* Keeps the git indentation */
    }

    /* Green lines for additions */
    .diff-added {
        background-color: #e6ffec !important;
        color: #1a7f37 !important;
    }

    /* Red lines for removals */
    .diff-removed {
        background-color: #ffeef0 !important;
        color: #d73a49 !important;
    }

    /* Purple lines for hunk headers (@@) */
    .diff-header {
        background-color: #f6f8fa !important;
        color: #6f42c1 !important;
        font-weight: bold;
    }

    /* Selection highlight color */
    #diff-results ::selection {
        background-color: #b3d4fc;
    }
</style>

<div class="container mt-4">

    <h2 id="title" class="mb-4">Manage GIT Repository</h2>
    <form id="git-form">
        <h3>Repository Status</h3>
        <div id="git-changes" class="mb-4">
        </div>

        <button id="commit" type="button" class="btn btn-primary">Commit</button>
        <button id="push" type="button" class="btn btn-success">Push</button>
        <button id="pull" type="button" class="btn btn-light">Pull main/origin</button>
        <button id="checkout" type="button" class="btn btn-warning">Checkout</button>
        <button id="reset" type="button" class="btn btn-danger">Reset</button>

        <div class="dropdown d-inline-block ms-1">
            <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                Branch
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" id="branch-switch" href="#">Switch</a></li>
                <li><a class="dropdown-item" id="branch-create" href="#">Create</a></li>
            </ul>
        </div>
    </form>
    <div id="unstaged-changes"></div>
    <div id="staged-changes"></div>
</div>

<script>
    const statusData = {{ status_data|tojson }};
</script>
<script src="{{ url_for('static', filename='git_manager/tools.js') }}"></script>
<script src="{{ url_for('static', filename='global.js') }}"></script>
{% endblock %}
