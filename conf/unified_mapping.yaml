endpoints:
  - name: deconz
    icon: mdi:zigbee
    host: slate
    internal_port: "6080"
    websocket: true
    preserve_host: "$host"
  - name: frigate
    entity: update.frigate_server
    template: frigate_template
    host: main
    internal_port: "5000"
    websocket: true
    connection_header: true
  - name: grafana
    icon: si:grafana
    host: pearl
    internal_port: "3000"
    extra-paths:
      - /api/live/
  - name: influxdb
    icon: si:influxdb
    host: pearl
    internal_port: "8086"
    extra-paths:
      - /pwa
  - name: kibana
    icon: si:kibana
    host: five
    internal_port: "5601"
  - name: litterbox-manager
    icon: lci:litterbox
    host: five
    internal_port: "5555"
  - name: phoscon
    entity: sensor.slate_deconz_version_info
    icon: phu:phoscon
    host: slate
    internal_port: "9080"
    extra-paths:
      - /pwa
  - name: photoprism
    entity: sensor.one_photoprism_version_info
    icon: mdi:camera-burst
    host: ubuntu-one
    internal_port: "2342"
    websocket: true
  - name: pihole
    entity: sensor.five_pihole_version_info
    icon: mdi:pi-hole
    host: five
    internal_port: "8080"
  - name: router
    entity: sensor.zenwifi_et9_3300_external_ip
    icon: mdi:router-network
    host: 192.168.50.1
    internal_port: "80"
  - name: tandoor
    entity: sensor.five_tandoor_version_info
    icon: lci:tandoor
    host: 192.168.50.15
    internal_port: "80"
  - name: webssh
    icon: mdi:ssh
    host: pearl
    internal_port: "8888"
    websocket: true
    preserve_host: "$http_host"
